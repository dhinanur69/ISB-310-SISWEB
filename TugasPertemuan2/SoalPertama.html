<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Soal Pertama</title>
<link rel="stylesheet" href="style1.css">
</head>

<body>

<div class="header-wrapper">
    <table class="header">
        <tr>
            <td class="header-title">Soal Pertama :)</td>
        </tr>
    </table>
</div>

<div class="wrapper">

    <div class="main">

        <div class="sidebar">

            <h3>Menu</h3>
            <p>Soal Pertama</p>
            <p>Soal Kedua</p>

            <h3 class="search">Search</h3>

            <input type="text" placeholder="Search this web">
            <button>GO!</button>

        </div>


        <div class="content">

            <h2>Tabel Sesuatu</h2>

            <div class="card">

                <table>

                    <tr>
                        <th>No</th>
                        <th>Huruf</th>
                        <th>Keterangan</th>
                    </tr>

                    <tr>
                        <td>1</td>
                        <td>A</td>
                        <td>Pertama</td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>B</td>
                        <td>Kedua</td>
                    </tr>

                    <tr>
                        <td>3</td>
                        <td>C</td>
                        <td>Ketiga</td>
                    </tr>

                    <tr class="footer">
                        <td colspan="3">Data di atas adalah data fiktif</td>
                    </tr>

                </table>

            </div>

        </div>

    </div>

</div>

</html>
